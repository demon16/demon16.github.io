  ### linux
    - * **install chrome** *

      `wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -`

      `sudo sh -c 'echo "deb http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'`

      `sudo apt update`

      `sudo apt-get install google-chrome-stable`

    - * **chrome flash-plugin** *

      `sudo apt install adobe-flashplugin` or `sudo apt-get install pepperflashplugin-nonfree`

    - * **sshserver with client key update** *

      `eval 'ssh-agent -s'`

      `ssh-add`

    - [change username and hostname](https://www.cnblogs.com/zeusmyth/p/6231350.html)

    - * **instal node.js 8.x** *

      `curl -sL https://deb.nodesource.com/setup_8.x | sudo -E bash -`
      
      `sudo apt-get install -y nodejs`

    - [use rar/unrar in centos](https://www.tecmint.com/how-to-open-extract-and-create-rar-files-in-linux/)
  
      `cd /tmp`
  
      `wget https://www.rarlab.com/rar/rarlinux-x64-5.6.0.tar.gz`
      
      `tar -zxvf rarlinux-x64-5.6.0.tar.gz`
      
      `cd rar`
      
      `sudo cp -v rar unrar /usr/local/bin/`

      200 OK                    [GET]             服务器成功返回用户请求的数据
      201 CREATED               [POST/PUT/PATCH]  用户新建或修改数据成功

      204 NO CONTENT            [DELETE]          用户删除数据成功

      403 Forbidden             [*]               禁止访问（有权限）
      404 NOT FOUND             [*]               服务器地址不存在
      406 Not Acceptable        [GET]             用户请求的格式不可得
      410 Gone                  [GET]             服务器资源不存在
      422 Unprocesable entity   [POST/PUT/PATCH]  创建对象验证错误
      500 INTERNAL SERVER ERROR [*]               服务器内部错误
